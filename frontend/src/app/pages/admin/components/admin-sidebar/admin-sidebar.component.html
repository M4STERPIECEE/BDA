<aside class="admin-sidebar" aria-label="Navigation admin">
  <div class="brand-block flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white shrink-0" style="background-color: #004ac6;">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
    </div>
    <div>
      <h1 class="text-2xl font-bold tracking-tighter text-black dark:text-slate-100">Curator</h1>
      <p class="text-[10px] uppercase tracking-widest text-on-surface-variant opacity-70">Academic Management</p>
    </div>
  </div>
  <nav class="menu-block">
    <a routerLink="/admin/dashboard" routerLinkActive="menu-item-active" [routerLinkActiveOptions]="{ exact: true }" class="menu-item">
      <span class="material-symbols-outlined">space_dashboard</span>
      <span>Dashboard</span>
    </a>
    <a routerLink="/admin/audit" routerLinkActive="menu-item-active" [routerLinkActiveOptions]="{ exact: true }" class="menu-item">
      <span class="material-symbols-outlined">fact_check</span>
      <span>Audit des Notes</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <button class="logout-side-btn" type="button" (click)="onLogout()">
      <span class="material-symbols-outlined">logout</span>
      <span>Déconnexion</span>
    </button>
  </div>
</aside>
