services:

  db:
    image: postgres:16-alpine
    container_name: bda-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration/v1_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/main/resources/db/migration/v2_triggers.sql:/docker-entrypoint-initdb.d/02_triggers.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: